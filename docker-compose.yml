services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sanxia_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: meingeheimespasswort
      POSTGRES_DB: sanxia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: