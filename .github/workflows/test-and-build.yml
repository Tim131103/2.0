name: Test & Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sanxia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json

      - name: Install Dependencies (Backend)
        working-directory: ./api
        run: npm ci

      - name: Run Backend Tests with Coverage 
        working-directory: ./api
        env:
          DATABASE_URL: postgres://testuser:testpassword@localhost:5432/sanxia_test
          JWT_SECRET: super_secret_test_key
          NODE_ENV: test
        run: npm test -- --coverage 

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./sanxia-explorer/package-lock.json

      - name: Install Dependencies (Frontend)
        working-directory: ./sanxia-explorer
        run: npm ci

      - name: Run Frontend Tests with Coverage 
        working-directory: ./sanxia-explorer
        run: npm test -- --coverage 

      - name: Build Frontend
        working-directory: ./sanxia-explorer
        run: npm run build
