name: CI & Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # 1. Run all tests
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            sanxia-explorer/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Run API tests
        run: npm test -- --forceExit
        working-directory: api
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: sanxia-explorer

      - name: Run frontend tests
        run: npx vitest run
        working-directory: sanxia-explorer

  # ──────────────────────────────────────────
  # 2. Build & Deploy (only on push to main)
  # ──────────────────────────────────────────
  deploy:
    name: Build & Deploy to Netlify
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sanxia-explorer/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: sanxia-explorer

      - name: Build frontend
        run: npm run build
        working-directory: sanxia-explorer
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: sanxia-explorer/dist
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
